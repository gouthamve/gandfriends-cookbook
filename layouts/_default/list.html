{{ define "main" }}
<article class="list">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}

  {{ $pages := where .Pages "Kind" "page" }}
  {{ if gt (len $pages) 0 }}
  <ul class="recipe-list">
    {{ range $pages.ByTitle }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</article>
{{ end }}
